<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş və Qeydiyyat | Xazerbaijan Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7000ff;
            --secondary: #00f2fe;
            --bg: #050507;
            --card-bg: #0f0f12;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            position: relative;
            width: 850px;
            max-width: 100%;
            height: 550px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        .login-container { left: 0; width: 50%; z-index: 2; }
        .signup-container { left: 0; width: 50%; opacity: 0; z-index: 1; }

        .auth-container.active .login-container { transform: translateX(100%); opacity: 0; }
        .auth-container.active .signup-container { transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s; }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        form {
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            height: 100%;
            text-align: center;
        }

        h1 { font-weight: 800; margin: 0 0 10px; color: white; }
        p { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }

        .input-group { width: 100%; position: relative; margin: 8px 0; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--secondary); opacity: 0.7; }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--secondary); background: rgba(0, 242, 254, 0.02); }

        .action-btn {
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            padding: 15px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .action-btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3); }

        /* Overlay (Sürüşən hissə) */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .auth-container.active .overlay-container { transform: translateX(-100%); }

        .overlay {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #FFFFFF;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .auth-container.active .overlay { transform: translateX(50%); }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left { transform: translateX(-20%); }
        .auth-container.active .overlay-left { transform: translateX(0); }

        .overlay-right { right: 0; transform: translateX(0); }
        .auth-container.active .overlay-right { transform: translateX(20%); }

        .ghost-btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .auth-container { width: 95%; height: auto; padding: 40px 0; }
            .overlay-container { display: none; }
            .form-container { width: 100%; position: relative; }
            .auth-container.active .signup-container { transform: none; }
        }
    </style>
</head>
<body>

    <div class="auth-container" id="container">
        <div class="form-container signup-container">
            <form action="#">
                <h1>Hesab Yarat</h1>
                <p>Xazerbaijan ailəsinə qoşulun</p>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Adınız">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Şifrə">
                </div>
                <button class="action-btn">Qeydiyyat</button>
            </form>
        </div>

        <div class="form-container login-container">
            <form action="#">
                <h1>Xoş Gəldiniz</h1>
                <p>Məlumatlarınızı daxil edin</p>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Şifrə">
                </div>
                <a href="#" style="color: rgba(255,255,255,0.4); font-size: 13px; text-decoration: none; margin-top: 10px;">Şifrəni unutmusunuz?</a>
                <button class="action-btn">Giriş Et</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h2>Artıq üzvsiniz?</h2>
                    <p>Layihələrinizi idarə etmək üçün giriş edin.</p>
                    <button class="ghost-btn" id="loginBtn">Giriş</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h2>Yeni Hesab?</h2>
                    <p>Xidmətlərimizdən tam yararlanmaq üçün qeydiyyatdan keçin.</p>
                    <button class="ghost-btn" id="signupBtn">Qeydiyyat</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signupBtn = document.getElementById('signupBtn');
        const loginBtn = document.getElementById('loginBtn');
        const container = document.getElementById('container');

        signupBtn.addEventListener('click', () => {
            container.classList.add("active");
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove("active");
        });
    </script>
</body>
</html>
