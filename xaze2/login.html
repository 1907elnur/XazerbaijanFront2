<!DOCTYPE html>
<html lang="az">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giriş</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0e14;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:#161b22;
padding:50px;
border-radius:15px;
width:350px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

.login-box h1{
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
}

.input-group input{

width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#0f1218;
color:white;
}

.login-btn{

width:100%;
padding:12px;
background:#7000ff;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
opacity:0.8;
}

.register{
margin-top:15px;
font-size:13px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Giriş</h1>

<div class="input-group">
<input type="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" placeholder="Şifrə">
</div>

<button class="login-btn">Daxil ol</button>

<div class="register" style="color: rgb(255, 255, 255);">
Hesabın yoxdur? <a style="text-decoration: none; color: aquamarine" href="signup.html">Hesab yarat</a>
</div>

</div>

</body>
</html>
