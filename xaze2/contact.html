<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Əlaqə | Xazerbaijan Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --c-neon: #00f2fe;
            --c-glow: rgba(0, 242, 254, 0.1);
        }

        body { background-color: #08080a; color: white; overflow-x: hidden; }

        .contact-hero {
            padding: 150px 10% 50px;
            text-align: center;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
            padding: 0 10% 100px;
        }

        /* Sol tərəf: İnformasiya */
        .contact-info-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .info-item { display: flex; align-items: center; gap: 20px; }
        .info-item i {
            width: 50px; height: 50px;
            background: var(--c-glow);
            border: 1px solid var(--c-neon);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: var(--c-neon);
            font-size: 20px;
        }

        /* Sağ tərəf: Form */
        .form-container {
            background: #111114;
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-size: 14px; opacity: 0.6; }

        .c-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .c-input:focus { border-color: var(--c-neon); box-shadow: 0 0 15px var(--c-glow); }

        .send-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #00f2fe, #7000ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(112, 0, 255, 0.3); }

        @media (max-width: 992px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .input-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <section class="contact-hero">
        <h1 class="h2e">Bizimlə <span style="color: var(--c-neon);">Əlaqə</span></h1>
        <p style="opacity: 0.6; margin-top: 15px;">Sualınız var və ya yeni layihəyə başlamaq istəyirsiniz? Yazın, cavablandıraq.</p>
    </section>

    <div class="contact-wrapper">
        <div class="contact-info-card">
            <div class="info-item">
                <i class="fa-solid fa-envelope"></i>
                <div>
                    <p style="font-size: 12px; opacity: 0.5;">Email ünvanımız</p>
                    <p style="font-weight: 600;">elnur.code@gmail.com</p>
                </div>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <div>
                    <p style="font-size: 12px; opacity: 0.5;">Ofisimiz</p>
                    <p style="font-weight: 600;">Bakı, Azərbaycan</p>
                </div>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-clock"></i>
                <div>
                    <p style="font-size: 12px; opacity: 0.5;">İş saatları</p>
                    <p style="font-weight: 600;">09:00 - 20:00 (B.e - C.)</p>
                </div>
            </div>

            <div style="margin-top: auto; display: flex; gap: 15px;">
                <a href="#" style="color: white; font-size: 20px; opacity: 0.5;"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: white; font-size: 20px; opacity: 0.5;"><i class="fab fa-linkedin"></i></a>
                <a href="#" style="color: white; font-size: 20px; opacity: 0.5;"><i class="fab fa-github"></i></a>
            </div>
        </div>

        <div class="form-container">
            <form id="contactForm" action="https://formspree.io/f/mwvavoja" method="POST">
                <div class="input-row">
                    <div class="form-group">
                        <label>Adınız</label>
                        <input type="text" name="name" class="c-input" placeholder="Elnur M." required>
                    </div>
                    <div class="form-group">
                        <label>Emailiniz</label>
                        <input type="email" name="email" class="c-input" placeholder="nümunə@mail.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Mövzu</label>
                    <input type="text" name="subject" class="c-input" placeholder="Nə barədə yazırsınız?">
                </div>

                <div class="form-group">
                    <label>Mesajınız</label>
                    <textarea name="message" class="c-input" rows="6" placeholder="Bura qeyd edin..." required></textarea>
                </div>

                <button type="submit" class="send-btn" id="submitBtn">Mesajı Göndər</button>
            </form>
            <div id="formResponse" style="margin-top: 20px; text-align: center; display: none;"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const responseDiv = document.getElementById('formResponse');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Göndərilir...";

            const formData = new FormData(form);
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                responseDiv.innerHTML = "✅ Mesajınız uğurla göndərildi! Sizinlə tezliklə əlaqə saxlayacağıq.";
                responseDiv.style.color = "#00ff88";
                responseDiv.style.display = "block";
                form.reset();
            } else {
                responseDiv.innerHTML = "❌ Xəta baş verdi. Zəhmət olmasa yenidən yoxlayın.";
                responseDiv.style.color = "#ff003c";
                responseDiv.style.display = "block";
            }
            btn.disabled = false;
            btn.innerText = "Mesajı Göndər";
        });
    </script>
</body>
</html>
