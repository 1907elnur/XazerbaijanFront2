<!DOCTYPE html>
<html lang="az">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Əlaqə</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0e14;
color:white;
}

.contact{

max-width:900px;
margin:auto;
padding:100px 20px;
}

.contact h1{

font-size:40px;
text-align:center;
margin-bottom:20px;
}

.contact p{

text-align:center;
opacity:0.6;
margin-bottom:40px;
}

.form{

display:grid;
gap:20px;
}

.form input,
.form textarea{

width:100%;
padding:14px;
background:#161b22;
border:none;
border-radius:8px;
color:white;
}

.form textarea{
height:150px;
resize:none;
}

.send-btn{

background:#7000ff;
border:none;
padding:14px;
border-radius:8px;
cursor:pointer;
font-size:15px;
color:white;
transition:0.3s;
}

.send-btn:hover{
opacity:0.8;
}

.info{

margin-top:50px;
display:flex;
justify-content:space-around;
flex-wrap:wrap;
gap:30px;
text-align:center;
}

.info div{
opacity:0.7;
}

</style>

</head>

<body>

<section class="contact">

<h1>Əlaqə</h1>

<p>Bizimlə əlaqə saxlamaq üçün formu doldurun</p>

<div class="form">

<input type="text" placeholder="Adınız">

<input type="email" placeholder="Email">

<textarea placeholder="Mesajınız"></textarea>

<button class="send-btn">Göndər</button>

</div>

<div class="info">

<div>
<i class="fa-solid fa-phone"></i>
<p>+994 50 000 00 00</p>
</div>

<div>
<i class="fa-solid fa-envelope"></i>
<p>info@xazerbaijan.az</p>
</div>

<div>
<i class="fa-solid fa-location-dot"></i>
<p>Bakı, Azərbaycan</p>
</div>

</div>

</section>

</body>
</html>
