
<!DOCTYPE html>
<html lang="az">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qeydiyyat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0e14;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* SIGNUP BOX */

.signup-box{

background:#161b22;
padding:50px;
border-radius:15px;
width:380px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.signup-box h1{
margin-bottom:25px;
font-size:28px;
}

/* INPUT */

.input-group{
margin-bottom:18px;
}

.input-group input{

width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#0f1218;
color:white;
font-size:14px;
}

.input-group input:focus{
outline:none;
border:1px solid #7000ff;
}

/* BUTTON */

.signup-btn{

width:100%;
padding:12px;
background:#7000ff;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.signup-btn:hover{
opacity:0.85;
}

/* LOGIN LINK */

.login-link{
margin-top:18px;
font-size:13px;
opacity:0.7;
}

.login-link a{
color:#7000ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="signup-box">

<h1>Qeydiyyat</h1>

<div class="input-group">
<input type="text" placeholder="Ad və Soyad">
</div>

<div class="input-group">
<input type="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" placeholder="Şifrə">
</div>

<div class="input-group">
<input type="password" placeholder="Şifrəni təkrar et">
</div>

<button class="signup-btn">Hesab yarat</button>

<div class="login-link">
Artıq hesabın var? <a style="color: aquamarine;" href="login.html">Giriş et</a>
</div>

</div>

</body>

</html>
